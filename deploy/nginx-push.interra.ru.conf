# Обратный прокси для бэкенда рассылки (push.interra.ru -> Node на :8080)
# Положить в /etc/nginx/sites-available/ и включить симлинком в sites-enabled/.

server {
    listen 80;
    server_name push.interra.ru;
    # Перенаправление на HTTPS (после получения сертификата)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name push.interra.ru;

    ssl_certificate     /etc/letsencrypt/live/push.interra.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/push.interra.ru/privkey.pem;

    # Админ-панель и API
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
