name: CI

on:
  push:
    branches: [main]
    # сборку/релиз гоняем только на изменения приложения или самого workflow;
    # коммиты в server/**, docs/**, README.md не запускают CI впустую
    paths:
      - "app/**"
      - ".github/workflows/ci.yml"
  pull_request:

jobs:
  analyze-test:
    name: Analyze & test (Flutter)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.4"
          channel: stable
          cache: true

      - name: Pub get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze lib test

      - name: Tests
        run: flutter test

  android-build:
    name: Build Android APK/AAB (release)
    runs-on: ubuntu-latest
    # нужно, чтобы шаг ниже мог создать релиз и залить в него файлы
    permissions:
      contents: write
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.4"
          channel: stable
          cache: true

      - name: Pub get
        run: flutter pub get

      # Релизная подпись: если в секретах репозитория лежит keystore и пароли,
      # восстанавливаем android/key.properties + upload-keystore.p12 -> сборка
      # подписывается сторовым ключом (годится для Google Play). Если секретов
      # нет, шаг ничего не делает и остаётся debug-подпись (см. build.gradle.kts).
      - name: Prepare Android signing
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/upload-keystore.p12
          cat > android/key.properties <<EOF
          storeFile=upload-keystore.p12
          storeType=PKCS12
          storePassword=$ANDROID_STORE_PASSWORD
          keyAlias=upload
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

      # Release-сборка: компилирует нативный Android-код и даёт компактный APK.
      # с key.properties (из секретов) - сторовая подпись; без него debug-подпись,
      # APK всё равно ставится на телефон для теста.
      - name: Build APK
        run: flutter build apk --release

      # AAB (App Bundle) - формат для загрузки в Google Play.
      - name: Build AAB
        run: flutter build appbundle --release

      # выкладываем APK и AAB артефактами сборки (доступны на вкладке Actions)
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: interra-android-release
          path: |
            app/build/app/outputs/flutter-apk/app-release.apk
            app/build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error

      # версия из pubspec (например 1.0.0+2) - для имени тега/релиза
      - name: Read app version
        if: github.event_name == 'push'
        id: ver
        run: |
          echo "version=$(grep '^version:' pubspec.yaml | sed 's/version: *//')" >> "$GITHUB_OUTPUT"

      # публикуем релиз на каждый push в main: тег build-<номер запуска>,
      # к нему прикладываем APK и AAB - их видно на вкладке Releases.
      - name: Publish GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Сборка ${{ steps.ver.outputs.version }} (#${{ github.run_number }})"
          body: |
            Автосборка из коммита ${{ github.sha }}.

            • `app-release.apk` — установить на телефон для теста
            • `app-release.aab` — App Bundle для загрузки в Google Play

            Примечание: без ключа подписи в CI сборка подписана debug-ключом.
          prerelease: true
          files: |
            app/build/app/outputs/flutter-apk/app-release.apk
            app/build/app/outputs/bundle/release/app-release.aab
          fail_on_unmatched_files: true
