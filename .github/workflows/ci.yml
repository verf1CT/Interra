name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  analyze-test:
    name: Analyze & test (Flutter)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.4"
          channel: stable
          cache: true

      - name: Pub get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze lib test

      - name: Tests
        run: flutter test
