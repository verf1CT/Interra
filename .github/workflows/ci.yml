name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  analyze-test:
    name: Analyze & test (Flutter)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.4"
          channel: stable
          cache: true

      - name: Pub get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze lib test

      - name: Tests
        run: flutter test

  android-build:
    name: Build Android APK (release)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.4"
          channel: stable
          cache: true

      - name: Pub get
        run: flutter pub get

      # Release-сборка: компилирует нативный Android-код и даёт компактный APK.
      # без key.properties подписывается debug-ключом (см. build.gradle.kts) -
      # ставится на телефон для теста.
      - name: Build APK
        run: flutter build apk --release

      # выкладываем APK артефактом, чтобы можно было скачать и поставить на телефон
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: interra-android-release
          path: app/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
