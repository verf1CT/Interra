<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ЛК Интерра — рассылка уведомлений</title>
  <style>
    :root { --accent: #e3000f; --bg: #f4f5f7; --card: #fff; --line: #e2e5ea; }
    * { box-sizing: border-box; }
    body { font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 0; background: var(--bg); color: #1c1f24; }
    header { background: var(--accent); color: #fff; padding: 16px 24px; font-size: 20px; font-weight: 600; }
    main { max-width: 720px; margin: 24px auto; padding: 0 16px; display: grid; gap: 20px; }
    .card { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 20px; }
    h2 { margin: 0 0 14px; font-size: 16px; }
    label { display: block; font-size: 13px; color: #525a66; margin: 12px 0 4px; }
    input, select, textarea { width: 100%; padding: 10px 12px; border: 1px solid var(--line); border-radius: 8px; font-size: 14px; font-family: inherit; }
    textarea { min-height: 80px; resize: vertical; }
    button { background: var(--accent); color: #fff; border: 0; border-radius: 8px; padding: 11px 18px; font-size: 14px; font-weight: 600; cursor: pointer; }
    button.secondary { background: #eef0f3; color: #1c1f24; }
    button:disabled { opacity: .5; cursor: default; }
    .row { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; }
    .row > * { flex: 1; min-width: 140px; }
    .muted { color: #8a92a0; font-size: 13px; }
    .pill { display: inline-block; padding: 2px 10px; border-radius: 999px; font-size: 12px; }
    .pill.on { background: #e3f7e8; color: #1a7f37; }
    .pill.off { background: #fde8e8; color: #b42318; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { text-align: left; padding: 8px 6px; border-bottom: 1px solid var(--line); }
    .result { margin-top: 12px; padding: 10px 12px; border-radius: 8px; font-size: 14px; display: none; }
    .result.ok { background: #e3f7e8; color: #1a7f37; display: block; }
    .result.err { background: #fde8e8; color: #b42318; display: block; }
    .tiles { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 10px; }
    .tile { background: #f7f8fa; border: 1px solid var(--line); border-radius: 10px; padding: 12px; }
    .tile .num { font-size: 22px; font-weight: 700; }
    .tile .lbl { font-size: 12px; color: #8a92a0; margin-top: 2px; }
    .bchart { display: grid; gap: 12px; }
    .bchart .head { display: flex; justify-content: space-between; gap: 8px; font-size: 12px; color: #525a66; }
    .bchart .head b { color: #1c1f24; font-weight: 600; }
    .bar { height: 9px; border-radius: 999px; background: #eef0f3; overflow: hidden; display: flex; margin-top: 4px; }
    .bar .ok { background: #1a7f37; }
    .bar .fail { background: #b42318; }
    a.tag { text-decoration: none; margin-left: 4px; }
    @media (max-width: 520px) { .tiles { grid-template-columns: repeat(2, 1fr); } }
    .hidden { display: none; }
  </style>
</head>
<body>
  <header>Интерра · панель рассылки уведомлений</header>
  <main>
    <div class="card" id="auth-card">
      <h2>Вход</h2>
      <label>Админ-токен</label>
      <input type="password" id="token" placeholder="ADMIN_TOKEN из .env" />
      <div class="row" style="margin-top:14px">
        <button id="login-btn">Войти</button>
      </div>
      <div class="result err" id="auth-error"></div>
    </div>

    <div class="card hidden" id="stats-card">
      <h2>Состояние <span id="fcm-pill" class="pill"></span></h2>
      <div id="stats-body" class="muted">Загрузка…</div>
    </div>

    <div class="card hidden" id="send-card">
      <h2>Новое уведомление</h2>
      <label>Кому</label>
      <div class="row">
        <select id="target-type">
          <option value="all">Всем клиентам</option>
          <option value="segment">По сегменту</option>
          <option value="login">Конкретному логину</option>
        </select>
        <input type="text" id="target-value" class="hidden" placeholder="значение" />
      </div>

      <label>Заголовок</label>
      <input type="text" id="title" placeholder="Например: Скоро завершится тариф" />

      <label>Текст</label>
      <textarea id="body" placeholder="Текст уведомления"></textarea>

      <label>Картинка (URL, необязательно)</label>
      <input type="text" id="image-url" placeholder="https://…/banner.jpg — покажется в уведомлении" />

      <label>Ссылка по нажатию (URL, необязательно)</label>
      <input type="text" id="link-url" placeholder="https://interra.ru/… — откроется по тапу" />

      <label>Запланировать на (необязательно — иначе отправится сразу)</label>
      <input type="datetime-local" id="send-at" />

      <div class="row" style="margin-top:16px">
        <button id="send-btn">Отправить</button>
        <button class="secondary" id="refresh-btn" style="flex:0 0 auto">Обновить статистику</button>
      </div>
      <div class="result" id="send-result"></div>
    </div>

    <div class="card hidden" id="scheduled-card">
      <h2>Запланированные рассылки</h2>
      <div id="scheduled-body" class="muted">—</div>
    </div>

    <div class="card hidden" id="analytics-card">
      <h2>Аналитика рассылок</h2>
      <div class="tiles" id="totals"></div>
      <div id="chart" class="bchart" style="margin-top:16px"></div>
    </div>

    <div class="card hidden" id="history-card">
      <h2>Последние рассылки</h2>
      <div id="history-body" class="muted">—</div>
    </div>
  </main>

  <script>
    let token = '';
    let lastStats = null;
    const $ = (id) => document.getElementById(id);

    async function api(path, opts = {}) {
      const res = await fetch(path, {
        ...opts,
        headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token, ...(opts.headers || {}) },
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || ('HTTP ' + res.status));
      return data;
    }

    $('login-btn').onclick = async () => {
      token = $('token').value.trim();
      $('auth-error').classList.remove('err');
      try {
        await loadStats();
        $('auth-card').classList.add('hidden');
        ['stats-card', 'send-card', 'scheduled-card', 'analytics-card', 'history-card'].forEach((id) => $(id).classList.remove('hidden'));
        loadScheduled();
      } catch (e) {
        $('auth-error').textContent = e.message;
        $('auth-error').classList.add('err');
      }
    };

    $('target-type').onchange = (e) => {
      const v = $('target-value');
      if (e.target.value === 'all') { v.classList.add('hidden'); }
      else {
        v.classList.remove('hidden');
        v.placeholder = e.target.value === 'login' ? 'логин клиента в UTM5' : 'название сегмента';
      }
    };

    async function loadStats() {
      const s = await api('/api/admin/stats');
      lastStats = s;
      const pill = $('fcm-pill');
      pill.textContent = s.fcmEnabled ? 'push включён' : 'push выключен (dry-run)';
      pill.className = 'pill ' + (s.fcmEnabled ? 'on' : 'off');

      const byPlatform = (s.devices.byPlatform || [])
        .map((p) => `${p.platform || '—'}: ${p.n}`).join(', ') || '—';
      $('stats-body').innerHTML =
        `Устройств всего: <b>${s.devices.total}</b><br>` +
        `С привязанным логином: <b>${s.devices.withLogin}</b><br>` +
        `По платформам: ${byPlatform}`;

      // KPI-плитки
      const t = s.totals || { total: 0, recipients: 0, success: 0, failure: 0, opens: 0 };
      const rate = t.recipients ? Math.round((t.success / t.recipients) * 100) : 0;
      const ctr = t.success ? Math.round((t.opens / t.success) * 100) : 0;
      const tile = (num, lbl) => `<div class="tile"><div class="num">${num}</div><div class="lbl">${lbl}</div></div>`;
      $('totals').innerHTML =
        tile(t.total, 'Рассылок') + tile(t.recipients, 'Получателей') +
        tile(t.success, 'Доставлено') + tile(rate + '%', 'Доставлено %') +
        tile(t.opens || 0, 'Открытий') + tile(ctr + '%', 'CTR (открыли)');

      // бар-чарт доставки по последним рассылкам (зелёное — успех, красное — ошибки)
      $('chart').innerHTML = (s.broadcasts || []).slice(0, 10).map((b) => {
        const rec = b.recipients || 0;
        const ok = rec ? (b.success_count / rec) * 100 : 0;
        const fail = rec ? (b.failure_count / rec) * 100 : 0;
        return `<div><div class="head"><b>${escapeHtml(b.title)}</b>` +
          `<span>${b.success_count}/${rec}${b.failure_count ? ' · ошибок ' + b.failure_count : ''}` +
          `${b.opens ? ' · 👁 ' + b.opens : ''}</span></div>` +
          `<div class="bar"><span class="ok" style="width:${ok}%"></span><span class="fail" style="width:${fail}%"></span></div></div>`;
      }).join('') || '<span class="muted">Пока нет данных.</span>';

      const rows = (s.broadcasts || []).map((b) => {
        let tags = '';
        try {
          const d = JSON.parse(b.data || '{}');
          if (d.image) tags += ` <a class="tag" href="${escapeHtml(d.image)}" target="_blank" rel="noopener" title="картинка">🖼️</a>`;
          if (d.link) tags += ` <a class="tag" href="${escapeHtml(d.link)}" target="_blank" rel="noopener" title="ссылка">🔗</a>`;
        } catch (_) {}
        return `<tr><td>${b.created_at}</td><td>${escapeHtml(b.title)}${tags}</td>` +
          `<td>${b.target_type}${b.target_value ? ':' + escapeHtml(b.target_value) : ''}</td>` +
          `<td>${b.success_count}/${b.recipients}</td></tr>`;
      }).join('');
      $('history-body').innerHTML = rows
        ? `<table><tr><th>Когда</th><th>Заголовок</th><th>Кому</th><th>Доставлено</th></tr>${rows}</table>`
        : 'Пока рассылок не было.';
    }

    $('refresh-btn').onclick = () => loadStats().catch((e) => alert(e.message));

    $('send-btn').onclick = async () => {
      const type = $('target-type').value;
      const target = { type };
      if (type !== 'all') target.value = $('target-value').value.trim();
      const payload = { title: $('title').value.trim(), body: $('body').value.trim(), target };
      const imageUrl = $('image-url').value.trim();
      const link = $('link-url').value.trim();
      const sendAt = $('send-at').value; // datetime-local, локальное время
      if (imageUrl) payload.imageUrl = imageUrl;
      if (link) payload.link = link;
      if (sendAt) payload.sendAt = sendAt;

      // предохранитель: подтверждение перед массовой рассылкой «всем»
      if (type === 'all') {
        const n = lastStats?.devices?.total ?? '—';
        const when = sendAt ? `\n\nЗапланировать на: ${sendAt.replace('T', ' ')}` : '';
        if (!confirm(`Отправить ВСЕМ клиентам (устройств: ${n})?\n\n${payload.title}\n${payload.body}${when}`)) {
          return;
        }
      }

      const result = $('send-result');
      result.className = 'result';
      $('send-btn').disabled = true;
      try {
        const r = await api('/api/admin/broadcast', { method: 'POST', body: JSON.stringify(payload) });
        if (r.scheduled) {
          result.textContent = `Запланировано на ${new Date(r.sendAt).toLocaleString('ru-RU')}`;
          loadScheduled();
        } else {
          result.textContent = `Отправлено: ${r.successCount}/${r.recipients}` +
            (r.failureCount ? `, ошибок: ${r.failureCount}` : '') +
            (r.note ? ` (${r.note})` : '');
          loadStats();
        }
        result.className = 'result ok';
        $('title').value = ''; $('body').value = '';
        $('image-url').value = ''; $('link-url').value = ''; $('send-at').value = '';
      } catch (e) {
        result.textContent = e.message;
        result.className = 'result err';
      } finally {
        $('send-btn').disabled = false;
      }
    };

    async function loadScheduled() {
      try {
        const { scheduled } = await api('/api/admin/scheduled');
        if (!scheduled || !scheduled.length) {
          $('scheduled-body').innerHTML = 'Нет запланированных рассылок.';
          return;
        }
        const rows = scheduled.map((b) =>
          `<tr><td>${new Date(b.send_at).toLocaleString('ru-RU')}</td>` +
          `<td>${escapeHtml(b.title)}</td>` +
          `<td>${b.target_type}${b.target_value ? ':' + escapeHtml(b.target_value) : ''}</td>` +
          `<td><button class="secondary" data-cancel="${b.id}" style="padding:5px 10px">Отменить</button></td></tr>`).join('');
        $('scheduled-body').innerHTML =
          `<table><tr><th>Когда</th><th>Заголовок</th><th>Кому</th><th></th></tr>${rows}</table>`;
        $('scheduled-body').querySelectorAll('[data-cancel]').forEach((btn) => {
          btn.onclick = async () => {
            btn.disabled = true;
            try {
              await api('/api/admin/scheduled/' + btn.dataset.cancel + '/cancel', { method: 'POST' });
              loadScheduled();
            } catch (e) { alert(e.message); btn.disabled = false; }
          };
        });
      } catch (e) {
        $('scheduled-body').textContent = e.message;
      }
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (c) =>
        ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }
  </script>
</body>
</html>
