name: lk_interra
description: ЛК Интерра — личный кабинет интернет-провайдера Интерра.
publish_to: "none"
version: 1.0.0+2

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  webview_flutter: ^4.8.0
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2
  http: ^1.2.2
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  firebase_analytics: ^11.3.3
  firebase_crashlytics: ^4.1.3
  flutter_local_notifications: ^17.2.3
  url_launcher: ^6.3.0
  local_auth: ^2.3.0
  quick_actions: ^1.0.7
  path_provider: ^2.1.4
  crypto: ^3.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_native_splash: ^2.4.1
  flutter_launcher_icons: ^0.14.1

# Иконки приложения (iOS/Android) из фирменного знака Интерры.
flutter_launcher_icons:
  image_path: "assets/icon_full.png"
  android: true
  ios: true
  remove_alpha_ios: true
  adaptive_icon_background: "#3C98D4"
  adaptive_icon_foreground: "assets/splash_logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/splash_logo.png

# Нативная заставка (убирает белую вспышку при запуске). Логотип на белом фоне.
flutter_native_splash:
  color: "#FFFFFF"
  image: assets/splash_logo.png
  android_12:
    color: "#FFFFFF"
    image: assets/splash_logo.png
